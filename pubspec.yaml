name: xemluong
description: "App xem lương từ mail phiếu lương."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.6.2

dependencies:
  flutter:
    sdk: flutter
  enough_mail: ^2.1.2
  google_ml_kit: ^0.16.0
  intl: ^0.19.0
  shared_preferences: ^2.3.4
  google_fonts: ^6.2.1
  image: ^4.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#0A0E21"
  image: "assets/images/logo.png"
  android_12:
    image: "assets/images/logo.png"
    color: "#0A0E21"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
